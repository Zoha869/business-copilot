<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoha AI — Assistant</title>
<style>
  :root{
    --bg:#F6F7F9;
    --surface:#FFFFFF;
    --surface-2:#EEF1F5;
    --border:#E3E7EC;
    --text:#17212E;
    --muted:#66707C;
    --navy:#12294D;
    --navy-2:#1B3A66;
    --gold:#B8912F;
    --gold-soft:#F3E9D2;
    --bubble-user:#12294D;
    --bubble-user-text:#FFFFFF;
    --bubble-bot:#FFFFFF;
    --shadow:0 2px 10px rgba(18,41,77,0.07);
    --radius:16px;
    --sidebar-w:230px;
  }

  [data-theme="dark"]{
    --bg:#0B131D;
    --surface:#121B27;
    --surface-2:#182432;
    --border:#233042;
    --text:#E7EBEF;
    --muted:#8B96A5;
    --navy:#1B3A66;
    --navy-2:#274C82;
    --gold:#D4AF54;
    --gold-soft:#2A2716;
    --bubble-user:#1B3A66;
    --bubble-user-text:#F3F5F8;
    --bubble-bot:#182432;
    --shadow:0 2px 14px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:background .25s ease, color .25s ease;
    overflow:hidden;
  }

  .app{
    display:flex;
    height:100vh;
    width:100vw;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:var(--sidebar-w);
    min-width:var(--sidebar-w);
    background:var(--surface);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    transition:margin-left .28s ease, box-shadow .28s ease;
  }
  .sidebar.collapsed{
    margin-left:calc(-1 * var(--sidebar-w));
  }

  .sidebar-top{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px 16px;
    border-bottom:1px solid var(--border);
  }
  .brand-dot{
    width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--navy),var(--gold));
    flex-shrink:0;
  }
  .brand-name{
    font-weight:600;
    font-size:15px;
    letter-spacing:.2px;
  }

  .sidebar-body{ flex:1; }

  .sidebar-bottom{
    padding:14px;
    border-top:1px solid var(--border);
  }

  .theme-toggle{
    width:100%;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    cursor:pointer;
    font-size:13.5px;
    font-family:inherit;
    transition:background .2s ease;
  }
  .theme-toggle:hover{ background:var(--gold-soft); }
  .theme-toggle svg{ width:16px; height:16px; flex-shrink:0; }

  /* ---------- Sidebar collapse button (top-left, floats over content) ---------- */
  .panel-btn{
    position:fixed;
    top:16px;
    left:16px;
    width:36px;
    height:36px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:50;
    box-shadow:var(--shadow);
    transition:left .28s ease, background .2s ease;
  }
  .panel-btn:hover{ background:var(--surface-2); }
  .panel-btn svg{ width:18px; height:18px; }

  .app.sidebar-open .panel-btn{
    left:calc(var(--sidebar-w) + 16px);
  }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    position:relative;
  }

  .chat-scroll{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }

  /* Empty / greeting state */
  .empty-state{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
  }
  .empty-state h1{
    font-family:"Georgia","Iowan Old Style",serif;
    font-size:30px;
    font-weight:600;
    margin:0 0 6px;
    color:var(--text);
    letter-spacing:.2px;
  }
  .empty-state p{
    margin:0;
    color:var(--muted);
    font-size:15px;
  }

  /* Messages */
  .messages{
    flex:1;
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:70px 24px 20px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .msg-row{
    display:flex;
    width:100%;
  }
  .msg-row.user{ justify-content:flex-end; }
  .msg-row.bot{ justify-content:flex-start; }

  .bubble{
    max-width:72%;
    padding:12px 16px;
    border-radius:var(--radius);
    font-size:14.5px;
    line-height:1.55;
    box-shadow:var(--shadow);
    white-space:pre-wrap;
  }
  .msg-row.user .bubble{
    background:var(--bubble-user);
    color:var(--bubble-user-text);
    border-bottom-right-radius:4px;
  }
  .msg-row.bot .bubble{
    background:var(--bubble-bot);
    color:var(--text);
    border:1px solid var(--border);
    border-bottom-left-radius:4px;
  }

  .typing{
    display:inline-flex;
    gap:4px;
    align-items:center;
    padding:2px 0;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--muted);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.2s; }
  .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

  /* ---------- Input area ---------- */
  .composer-wrap{
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 24px 22px;
    background:linear-gradient(180deg, transparent, var(--bg) 40%);
  }
  .composer{
    width:100%;
    max-width:760px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:flex-end;
    padding:10px 10px 10px 18px;
    gap:10px;
  }
  .composer textarea{
    flex:1;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    color:var(--text);
    font-family:inherit;
    font-size:14.5px;
    line-height:1.5;
    max-height:180px;
    padding:8px 0;
  }
  .composer textarea::placeholder{ color:var(--muted); }

  .send-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:var(--navy);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background .2s ease, opacity .2s ease;
  }
  .send-btn:hover{ background:var(--navy-2); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .send-btn svg{ width:16px; height:16px; }

  .empty-composer{
    width:100%;
    max-width:640px;
    margin:0 auto;
  }

  /* ---------- Overlay for mobile sidebar ---------- */
  .overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,15,22,.45);
    z-index:40;
  }

  /* ---------- Responsive / mobile ---------- */
  @media (max-width:720px){
    .sidebar{
      position:fixed;
      top:0; left:0; bottom:0;
      z-index:45;
      margin-left:calc(-1 * var(--sidebar-w));
      box-shadow:none;
    }
    .sidebar.mobile-open{
      margin-left:0;
      box-shadow:0 0 24px rgba(0,0,0,.25);
    }
    .app.sidebar-open .panel-btn{ left:16px; }
    .overlay.show{ display:block; }
    .messages{ padding:64px 14px 16px; }
    .bubble{ max-width:85%; font-size:14px; }
    .composer-wrap{ padding:12px 12px 16px; }
    .empty-state h1{ font-size:24px; }
  }
</style>
</head>
<body data-theme="light">
<div class="app" id="app">

  <div class="overlay" id="overlay"></div>

  <!-- Sidebar: kept intentionally minimal -->
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-top">
      <div class="brand-dot"></div>
      <div class="brand-name">Zoha AI</div>
    </div>
    <div class="sidebar-body"></div>
    <div class="sidebar-bottom">
      <button class="theme-toggle" id="themeToggle">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>
        <span id="themeLabel">Dark mode</span>
      </button>
    </div>
  </aside>

  <!-- Sidebar toggle, top-left -->
  <button class="panel-btn" id="panelBtn" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
  </button>

  <main class="main">
    <div class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <h1>How can I help you today?</h1>
        <p>Ask anything — I'll do my best to reply.</p>
      </div>

      <div class="messages" id="messages" style="display:none;"></div>
    </div>

    <div class="composer-wrap">
      <div class="composer" id="composerBox">
        <textarea id="input" rows="1" placeholder="Ask something..."></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
  const API_URL = "http://127.0.0.1:8000/chat";

  const body = document.body;
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel = document.getElementById('themeLabel');
  const app = document.getElementById('app');
  const sidebar = document.getElementById('sidebar');
  const panelBtn = document.getElementById('panelBtn');
  const overlay = document.getElementById('overlay');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const chatScroll = document.getElementById('chatScroll');

  const isMobile = () => window.innerWidth <= 720;

  // ---------- Theme ----------
  const sunIcon = `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>`;
  const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

  function applyTheme(theme){
    body.setAttribute('data-theme', theme);
    if(theme === 'dark'){
      themeIcon.innerHTML = moonIcon;
      themeLabel.textContent = 'Light mode';
    } else {
      themeIcon.innerHTML = sunIcon;
      themeLabel.textContent = 'Dark mode';
    }
    localStorage.setItem('zoha-ai-theme', theme);
  }

  const savedTheme = localStorage.getItem('zoha-ai-theme') ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);

  themeToggle.addEventListener('click', () => {
    const current = body.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  // ---------- Sidebar toggle ----------
  function openSidebar(){
    if(isMobile()){
      sidebar.classList.add('mobile-open');
      overlay.classList.add('show');
    } else {
      sidebar.classList.remove('collapsed');
      app.classList.add('sidebar-open');
    }
  }
  function closeSidebar(){
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('show');
    sidebar.classList.add('collapsed');
    app.classList.remove('sidebar-open');
  }
  let sidebarShown = false;
  panelBtn.addEventListener('click', () => {
    sidebarShown = !sidebarShown;
    sidebarShown ? openSidebar() : closeSidebar();
  });
  overlay.addEventListener('click', () => {
    sidebarShown = false;
    closeSidebar();
  });

  // ---------- Auto-expanding textarea ----------
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 180) + 'px';
  });
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  // ---------- Chat logic ----------
  function addMessage(text, sender){
    if(emptyState.style.display !== 'none'){
      emptyState.style.display = 'none';
      messagesEl.style.display = 'flex';
    }
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    chatScroll.scrollTop = chatScroll.scrollHeight;
    return bubble;
  }

  function addTyping(){
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typingRow';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function removeTyping(){
    const row = document.getElementById('typingRow');
    if(row) row.remove();
  }

  async function sendMessage(){
    const text = input.value.trim();
    if(!text) return;

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    addTyping();

    try{
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.message || "Sorry, kuch samajh nahi aaya.", 'bot');
    } catch(err){
      removeTyping();
      addMessage("Backend se connect nahi ho raha. Check karo ke FastAPI server (main.py) run ho raha hai.", 'bot');
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
